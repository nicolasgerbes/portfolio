<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <nav
        class="fixed top-4 left-1/2 z-[100] w-[95%] -translate-x-1/2 rounded-[2rem] border border-white/20 bg-white/60 backdrop-blur-2xl transition-all duration-500 hover:border-vibrant/50 dark:border-slate-800/50 dark:bg-slate-950/70 md:top-6 md:max-w-5xl shadow-[0_8px_32px_0_rgba(0,0,0,0.1)]">
        <div class="mx-auto flex h-16 items-center justify-between px-6 md:h-20">

            <a href="#" class="group z-[110] flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900 transition-all group-hover:rotate-[10deg] group-hover:scale-110 dark:bg-vibrant">
                    <span class="text-lg font-black text-white dark:text-slate-950 italic">N</span>
                </div>
                <span class="hidden text-xl font-black italic tracking-tighter text-slate-900 dark:text-white sm:block">
                    NICOLAS<span class="animate-pulse text-vibrant">.</span>DEV
                </span>
            </a>

            <div class="hidden items-center gap-1 md:flex">
                <a href="#home"
                    class="relative rounded-full px-5 py-2 text-sm font-bold text-slate-600 transition-all hover:text-vibrant dark:text-slate-400">
                    Início
                    <span
                        class="absolute bottom-1 left-1/2 h-1 w-1 -translate-x-1/2 rounded-full bg-vibrant opacity-0 transition-all group-hover:opacity-100"></span>
                </a>
                <a href="#projetos"
                    class="rounded-full px-5 py-2 text-sm font-bold text-slate-600 transition-all hover:text-vibrant dark:text-slate-400">Projetos</a>

                <a href="#contato"
                    class="ml-4 overflow-hidden relative group rounded-full bg-slate-950 px-8 py-2.5 text-sm font-black text-white transition-all hover:pr-10 dark:bg-white dark:text-slate-950">
                    <span class="relative z-10">CONTATO</span>
                    <span
                        class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 transition-all group-hover:opacity-100 group-hover:right-3">→</span>
                    <div
                        class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-vibrant/20 to-transparent transition-transform duration-500 group-hover:translate-x-full">
                    </div>
                </a>
            </div>

            <button id="menu-btn"
                class="relative z-[110] flex h-10 w-10 flex-col items-center justify-center rounded-full bg-slate-900 dark:bg-white md:hidden">
                <span id="line1"
                    class="h-0.5 w-5 rounded-full bg-white dark:bg-slate-950 transition-all duration-300"></span>
                <span id="line2"
                    class="mt-1.5 h-0.5 w-5 origin-center rounded-full bg-white transition-all duration-300 dark:bg-slate-950"></span>
                <span id="line3"
                    class="mt-1.5 h-0.5 w-5 origin-center rounded-full bg-white transition-all duration-300 dark:bg-slate-950"></span>
            </button>
        </div>

        <div id="mobile-menu"
            class="fixed inset-0 z-[100] flex translate-y-[-100%] flex-col items-center justify-center gap-8 bg-slate-900/95 opacity-0 backdrop-blur-3xl transition-all duration-700 ease-[italic] dark:bg-slate-950/98 md:hidden">
            <a href="#home"
                class="mobile-link text-5xl font-black italic tracking-tighter text-white/20 transition-all hover:text-vibrant hover:scale-110">HOME</a>
            <a href="#projetos"
                class="mobile-link text-5xl font-black italic tracking-tighter text-white/20 transition-all hover:text-vibrant hover:scale-110">WORKS</a>
            <a href="#contato"
                class="mobile-link group flex items-center gap-4 text-2xl font-bold text-vibrant uppercase tracking-widest">
                Falar agora <span class="h-px w-12 bg-vibrant"></span>
            </a>
        </div>
    </nav>


    <script src="./scripts/script.js"></script>
</body>

</html>
